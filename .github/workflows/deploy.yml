name: Build Salesman Portal

on:
  push:
    branches:
      - main
    paths:
      - "reimage-salesman-portal/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

jobs:
  build:
    name: Build salesman portal
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: reimage-salesman-portal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: reimage-salesman-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build salesman portal
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: salesman-portal-dist
          path: reimage-salesman-portal/dist
        id: deployment
        uses: actions/deploy-pages@v4
